# =============================================================================
# Sistema de Gestion de Tickets de Soporte
# Enfasis Profesional I (Integracion Continua) - Politecnico Grancolombiano
# =============================================================================
# Este archivo orquesta los cuatro contenedores que componen la solucion:
#
#   - db        : PostgreSQL 16 (motor de persistencia)
#   - backend   : API REST en Python con Flask
#   - frontend  : Interfaz web servida por Nginx con proxy reverso
#   - jenkins   : Gestor de operaciones CI/CD (Entrega 2)
#
# Los contenedores se comunican a traves de una red interna (ticket-net).
# La comunicacion entre ellos se resuelve por DNS interno de Docker usando
# el nombre del servicio como hostname.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Contenedor 1: Base de Datos PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: ticket-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ticket_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticket_pass}
      POSTGRES_DB: ${POSTGRES_DB:-tickets_db}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticket_user} -d ${POSTGRES_DB:-tickets_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ticket-net

  # ---------------------------------------------------------------------------
  # Contenedor 2: Backend (API REST en Flask)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticket-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ticket_user}:${POSTGRES_PASSWORD:-ticket_pass}@db:5432/${POSTGRES_DB:-tickets_db}
      FLASK_ENV: production
      PORT: "5000"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ticket-net

  # ---------------------------------------------------------------------------
  # Contenedor 3: Frontend (Nginx con proxy reverso hacia el backend)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticket-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - ticket-net

  # ---------------------------------------------------------------------------
  # Contenedor 4: Jenkins (Gestor de operaciones CI/CD - Entrega 2)
  # ---------------------------------------------------------------------------
  # Jenkins se ejecuta dentro de un contenedor para mantener la coherencia
  # operativa con el resto del stack. Tiene acceso al socket de Docker del
  # host para poder construir imagenes y orquestar los demas contenedores
  # como parte del pipeline.
  # ---------------------------------------------------------------------------
  jenkins:
    image: jenkins/jenkins:lts
    container_name: ticket-jenkins
    restart: unless-stopped
    user: root  # Necesario para acceder al socket de Docker
    ports:
      - "8081:8080"    # UI de Jenkins (8080 ya esta usado por el frontend)
      - "50000:50000"  # Conexiones de agentes Jenkins
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=true"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock  # Permite a Jenkins usar Docker del host
    networks:
      - ticket-net

# =============================================================================
# Red interna que conecta los cuatro contenedores
# =============================================================================
networks:
  ticket-net:
    driver: bridge
    name: ticket-net

# =============================================================================
# Volumenes persistentes
# =============================================================================
volumes:
  db_data:
    name: ticket-db-data
  jenkins_data:
    name: ticket-jenkins-data
