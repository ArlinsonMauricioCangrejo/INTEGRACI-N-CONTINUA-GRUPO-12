# Configuración Nginx para el contenedor Frontend.
# Sirve los archivos estáticos del Sistema de Gestión de Tickets y
# proxifica las solicitudes /api/* hacia el contenedor Backend usando
# el nombre de servicio resuelto por la red interna de Docker Compose.

server {
    listen 80;
    server_name localhost;

    # Sirve la interfaz web (HTML, CSS, JS)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Proxy reverso hacia el contenedor backend.
    # El nombre 'backend' lo resuelve la red interna de Docker Compose
    # (ticket-net), evidenciando la comunicación entre contenedores.
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Endpoint propio del frontend para verificar que Nginx está vivo
    location = /frontend-health {
        access_log off;
        return 200 "frontend-ok\n";
        add_header Content-Type text/plain;
    }
}
